services:
  postgres:
    image: postgres:16-alpine
    container_name: paas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: paas_user
      POSTGRES_PASSWORD: paas_pass
      POSTGRES_DB: paas_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paas_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paas-net

  backend:
    build: ./backend
    container_name: paas-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://paas_user:paas_pass@postgres:5432/paas_db
      JWT_SECRET_KEY: change-this-to-a-long-random-secret
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      ROOT_PATH: /api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      # - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - paas-net

  frontend:
    image: nginx:1.25-alpine
    container_name: paas-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - paas-net

  nginx:
    image: nginx:1.25-alpine
    container_name: paas-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - paas-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: paas-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - paas-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: paas-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - paas-net

networks:
  paas-net:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
