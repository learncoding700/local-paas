<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Local PaaS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="page-auth">
    <main class="auth-wrap">
      <div class="card auth-card">
        <h1 class="auth-title">Local PaaS</h1>
        <p class="auth-sub">Local Container-Based Application Deployment System</p>
        <form id="login-form" class="auth-form" novalidate>
          <label class="field">
            <span>Username</span>
            <input type="text" name="username" autocomplete="username" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="btn btn-primary btn-block">Login</button>
          <div id="login-error" class="form-error hidden" role="alert"></div>
        </form>
        <p class="auth-footer">MCA Final Year Project</p>
      </div>
    </main>
    <script src="/js/app.js"></script>
  </body>
</html>
